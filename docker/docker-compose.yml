#version: '3.8'

services:
  app:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: trading-app
    ports:
      - "8080:8080"
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: trading-db
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
    ports:
      - "5432:5432"